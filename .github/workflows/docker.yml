name: "GHGA CI - Docker Build & Push"

on:
  workflow_call:
    inputs:
      checkout:
        description: "Checkout the repository"
        type: boolean
        default: true
      dockerhub_username:
        description: "The DockerHub username"
        type: string
        default: "ghga"
      tag:
        description: "The tag used to publish to the registry."
        type: string
        required: true
      dockerhub_namespace:
        description: "The namespace used to publish to the registry."
        type: string
        default: "ghga"
      dockerhub_repository:
        # NOTE: Cannot use ${{ github.event.repository.name }} as a default here —
        # expression defaults are not supported for workflow_call inputs.
        # Leave empty to fall back to the calling repo's name (resolved in a step below).
        description: "The Docker Hub repository to publish to. Defaults to calling repo name."
        type: string
        default: ""
      working_directory:
        description: "Directory which contains Dockerfile and project configuration files."
        type: string
        default: "."
      trivy_severity:
        description: "Severities of vulnerabilities to scanned for and displayed."
        type: string
        default: "CRITICAL,HIGH"
      trivy_enabled:
        description: "Enable trivy scanning."
        type: boolean
        default: true
      dockerhub_platforms:
        description: "Platforms passed to DockerHub build and push action."
        type: string
        default: "linux/amd64,linux/arm64"
      flavor:
        description: "Flavor to build. Expects 'Dockerfile.{flavor}' to be present and appends '-{flavor}' to the tag."
        type: string
        default: ""
    secrets:
      dockerhub_token:
        description: "The DockerHub token used to authenticate"
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        name: Check out code
        if: ${{ inputs.checkout == true }}

      - if: contains(fromJSON('["release"]'), github.event_name)
        name: Ensure that tag complies with semantic versioning.
        uses: matt-usurp/validate-semver@v2
        with:
          version: ${{ inputs.tag }}

      - if: contains(fromJSON('["release"]'), github.event_name)
        uses: actions/setup-python@v6
        name: Set up Python 3.12
        with:
          python-version: "3.12"

      - if: contains(fromJSON('["release"]'), github.event_name)
        name: Ensure package version and tag are equal
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        run: |
          if [ -f "setup.py" ]
          then
            echo "Using setup.py to extract python package version"
            pip install setuptools
            PKG_VER="$(python setup.py --version)"
          elif [ -f "pyproject.toml" ]
          then
            echo "Using pyproject.toml to extract python package version"
            version=$(python3.12 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
            PKG_VER=$version
          elif [ -f "package.json" ]
          then
            PKG_VER="$(jq -r .version package.json)"
          else
            echo "None of setup.py, pyproject.toml, package.json was found." >&2; exit 1
          fi

          TAG_VER=${{ inputs.package_version }}
          [[ -z "$TAG_VER" ]] && TAG_VER=${{ inputs.tag }}

          echo "Package version is $PKG_VER" >&2
          echo "Tag version is $TAG_VER" >&2
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "Package version and tag name mismatch." >&2
            exit 1
          fi

      - name: Resolve Docker Hub repository name
        id: repo
        shell: bash
        run: |
          REPO="${{ inputs.dockerhub_repository }}"
          if [ -z "$REPO" ]; then
            REPO="${{ github.event.repository.name }}"
          fi
          echo "name=$REPO" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v4
        name: Set up QEMU

      - uses: docker/setup-buildx-action@v4
        name: Set up Docker Buildx

      - uses: docker/login-action@v4
        name: Login to DockerHub
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Construct Dockerfile and tag suffixes
        shell: bash
        id: get_suffixes
        run: |
          if [ -n "${{ inputs.flavor }}" ]; then
            echo "dockerfile_suffix=.${{ inputs.flavor }}" >> $GITHUB_OUTPUT
            echo "tag_suffix=-${{ inputs.flavor }}" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_suffix=" >> $GITHUB_OUTPUT
            echo "tag_suffix=" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v7
        name: Build and push
        id: docker_build
        with:
          push: true
          platforms: "${{ inputs.dockerhub_platforms }}"
          file: "${{ inputs.working_directory }}/Dockerfile${{ steps.get_suffixes.outputs.dockerfile_suffix }}"
          tags: "${{ inputs.dockerhub_namespace }}/${{ steps.repo.outputs.name }}:${{ inputs.tag }}${{ steps.get_suffixes.outputs.tag_suffix }}"
          context: "${{ inputs.working_directory }}"
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
          ${{ inputs.dockerhub_namespace }}/${{ steps.repo.outputs.name }}@${{ steps.docker_build.outputs.digest }}

      - if: inputs.trivy_enabled == true
        name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_DB_REPOSITORY: "ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db"
        with:
          image-ref: "docker.io/${{ inputs.dockerhub_namespace }}/${{ steps.repo.outputs.name }}:${{ inputs.tag }}${{ steps.get_suffixes.outputs.tag_suffix }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: ${{ inputs.trivy_severity }}
          version: v0.69.3

      - name: Image digest
        shell: bash
        run: echo ${{ steps.docker_build.outputs.digest }}
